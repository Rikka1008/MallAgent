services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mall_agent
      POSTGRES_USER: mall_agent
      POSTGRES_PASSWORD: mall_agent

  after-sales-agent:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres
    environment:
      APP_ENV: local
